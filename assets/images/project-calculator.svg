<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360" role="img" aria-label="Calculator">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="600" height="360" rx="28" fill="url(#g)"/>
  <circle cx="500" cy="72" r="96" fill="#fff" opacity="0.14"/>
  <circle cx="80" cy="300" r="78" fill="#fff" opacity="0.11"/>
  <rect x="62" y="72" width="476" height="216" rx="24" fill="#0f172a" opacity="0.72" filter="url(#shadow)"/>
  <text x="94" y="145" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="64" font-weight="700">+</text>
  <text x="94" y="210" fill="#ffffff" font-family="Arial, sans-serif" font-size="32" font-weight="700">Calculator</text>
  <text x="94" y="248" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="19">JavaScript operations</text>
</svg>